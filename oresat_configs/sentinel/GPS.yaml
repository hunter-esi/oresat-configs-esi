revision: 0
ax25:
  dest_callsign: SPACE
  dest_ssid: 0  # primary station
  src_callsign: KJ7SAT
  src_ssid: 11  # balloons, aircraft, spacecraft, etc
  control: 0x3  # ui-frame
  pid: 0xf0  # no L3 protocol
  command: false
  response: true
fields:
  # c3
  - [beacon, start_chars]
  - [satellite_id]
  - [beacon, revision]
  - [status]
  - [mode]
  - [system, uptime]
  - [system, unix_time]
  - [system, power_cycles]
  - [system, storage_percent]
  - [uhf, rx_bytes]
  - [uhf, rx_packets]
  - [uhf, rssi]
  - [edl, sequence_count]
  - [edl, rejected_count]
  - [fread_cache, length]
  - [fwrite_cache, length]
  - [updater, cache_length]
  - [adcs_manager, mode]
  # battery_1
  - [battery_1, pack_1_vbatt]
  - [battery_1, pack_1_current]
  - [battery_1, pack_2_vbatt]
  - [battery_1, pack_2_current]
  # battery_1
  - [battery_2, pack_1_vbatt]
  - [battery_2, pack_1_current]
  - [battery_2, pack_2_vbatt]
  - [battery_2, pack_2_current]
  # solar_1
  - [solar_1, output_power_avg]
  - [solar_1, output_power_max]
  # solar_2
  - [solar_2, output_power_avg]
  - [solar_2, output_power_max]
  # solar_3
  - [solar_3, output_power_avg]
  - [solar_3, output_power_max]
  # solar_4
  - [solar_4, output_power_avg]
  - [solar_4, output_power_max]
  # solar_5
