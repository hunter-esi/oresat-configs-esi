# LEOP Beacon to transmit as many GPS datapoints as feasable.
revision: 0
ax25:
  dest_callsign: SPACE
  dest_ssid: 0  # primary station
  src_callsign: ESISEN
  src_ssid: 11  # balloons, aircraft, spacecraft, etc
